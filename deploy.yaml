apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-accounts
spec:
  replicas: 2
  selector:
    matchLabels:
      app: customer-accounts
  template:
    metadata:
      labels:
        app: customer-accounts
    spec:
      containers:
      - name: customer-accounts
        image: customer-accounts:latest
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: customer-accounts-service
spec:
  selector:
    app: customer-accounts
  ports:
  - protocol: TCP
    port: 80
    targetPort: 5000
  type: LoadBalancer